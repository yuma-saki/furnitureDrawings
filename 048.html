<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>建具・家具作図ツール V114.8 - 固定棚トグル・全角対応・扉連動補正</title>
    <style>
        /* --- 永久不変のオリジナルCSS（絶対にいじらない） --- */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f3; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 1650px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: grid; grid-template-columns: 440px 1fr; gap: 20px; }
        h1 { grid-column: 1 / -1; font-size: 18px; text-align: center; color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 10px; margin-top:0; }
        .controls { display: flex; flex-direction: column; gap: 6px; max-height: 92vh; overflow-y: auto; padding-right: 15px; }
        .group { background: #fff5eb; padding: 10px; border-radius: 8px; border-left: 5px solid #e67e22; margin-bottom: 4px; }
        .group-title { font-size: 11px; color: #d35400; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #ffdec0; }
        label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-top: 4px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        .btn-main { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-orange { background: #e67e22; }
        .btn-blue { background: #3498db; }
        .btn-dark { background: #34495e; }
        .preview-area { background: #dcdde1; display: grid; grid-template-columns: 1fr 40px; grid-template-rows: 1fr 40px; border: 2px solid #7f8fa6; position: relative; overflow: hidden; }
        .canvas-wrapper { grid-column: 1; grid-row: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #555; }
        canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: grab; width: 100%; height: auto; max-height: 100%; object-fit: contain; touch-action: none; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
        .slider-v { grid-column: 2; grid-row: 1; display: flex; justify-content: center; padding: 20px 0; background: #f1f2f6; border-left: 1px solid #ccc; }
        .slider-h { grid-column: 1; grid-row: 2; display: flex; align-items: center; padding: 0 20px; background: #f1f2f6; border-top: 1px solid #ccc; }
        input[type=range] { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 100%; cursor: pointer; }
        .slider-h input { width: 100%; height: 8px; writing-mode: initial; appearance: auto; }

        .btn-add { background: #27ae60; padding: 6px; font-size: 11px; margin-top: 5px; border: none; border-radius: 4px; color: white; cursor: pointer; width: 120px; }
        .btn-del { background: #e74c3c; padding: 2px 5px; font-size: 10px; border: none; border-radius: 4px; color: white; height: 24px; cursor: pointer; }
        .btn-copy { background: #3498db; padding: 2px 5px; font-size: 10px; border: none; border-radius: 4px; color: white; height: 24px; cursor: pointer; }
        
        .spec-row { display: grid; grid-template-columns: 80px 1fr 30px; gap: 5px; margin-bottom: 4px; }

        .scale-btn-group { display: flex; gap: 2px; margin-top: 4px; }
        .btn-scale { flex: 1; padding: 3px 0; font-size: 10px; background: #fff; border: 1px solid #e67e22; color: #e67e22; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-scale:hover { background: #e67e22; color: #fff; }

        @media print {
            @page { size: A3 landscape; margin: 0; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            body, html { width: 420mm !important; height: 297mm !important; margin: 0 !important; padding: 0 !important; background: white !important; overflow: hidden !important; }
            .controls, h1, .hint-badge, .slider-v, .slider-h, .action-buttons { display: none !important; }
            .container { display: block !important; width: 420mm !important; height: 297mm !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; position: fixed; top: 0; left: 0; }
            .preview-area, .canvas-wrapper { width: 420mm !important; height: 297mm !important; border: none !important; background: white !important; display: block !important; }
            canvas { width: 420mm !important; height: 297mm !important; display: block !important; image-rendering: auto; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h1>建具・家具 統合作図ツール V114.8 (固定棚トグル・全角対応・扉連動)</h1>
    <div class="controls">
        <div class="group" style="background: #e8f6f3; border-left-color: #1abc9c;">
            <div class="group-title" style="color: #16a085;">0. プロジェクト管理</div>
            <div class="row-btns" style="margin-bottom: 5px;">
                <button class="btn-main btn-blue" style="padding:8px;" onclick="saveProjectFile()">保存</button>
                <button class="btn-main btn-gray" style="padding:8px;" onclick="document.getElementById('loadFile').click()">開く</button>
                <input type="file" id="loadFile" style="display:none" accept=".json" onchange="loadProjectFile(this)">
            </div>
            <button class="btn-main btn-dark" style="padding:5px; width:100%; font-size:11px;" onclick="resetToDefault()">新規作成</button>
        </div>

        <div class="group">
            <div class="group-title">1. 図面情報 (表題欄)</div>
            <label>会社名</label><input type="text" id="compName" value="(株) 崎原工房" oninput="drawPreview()">
            <label>工事名</label><input type="text" id="pjName" value="〇〇邸 新築工事" oninput="drawPreview()">
            <label>図面名</label><input type="text" id="dwgName" value="家具姿図・詳細図" oninput="drawPreview()">
            <div style="display:flex; gap:5px;">
                <div style="flex: 1.5;">
                    <label>縮尺</label>
                    <input type="text" id="scaleStr" value="1/20" oninput="drawPreview()">
                    <div class="scale-btn-group">
                        <button class="btn-scale" onclick="setScale('1/10')">1/10</button>
                        <button class="btn-scale" onclick="setScale('1/15')">1/15</button>
                        <button class="btn-scale" onclick="setScale('1/20')">1/20</button>
                        <button class="btn-scale" onclick="setScale('1/30')">1/30</button>
                    </div>
                </div>
                <div><label>日付</label><input type="text" id="dateStr" value="2026/03/16" oninput="drawPreview()"></div>
                <div><label>担当</label><input type="text" id="managerStr" value="設計部" oninput="drawPreview()"></div>
                <div><label>図番</label><input type="text" id="dwgNoStr" value="A-01" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">2. 基本寸法・タイプ</div>
            <div style="margin-bottom: 8px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ffd1a4;">
                <label>作図タイプ</label>
                <select id="doorType" onchange="drawPreview()">
                    <option value="standard">建具：標準（1枚）</option>
                    <option value="single">建具：片開き</option>
                    <option value="double">建具：両開き</option>
                    <option value="furniture" style="background:#e8f8f5; font-weight:bold;" selected>【家具】収納棚（オープン・扉）</option>
                </select>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>全幅 (W)</label><input type="number" id="w" value="1800" oninput="drawPreview()"></div>
                <div><label>全高 (H)</label><input type="number" id="h" value="850" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ffd1a4;">
                <div style="flex:1;"><label>左右(X)</label><input type="number" id="offX" value="0" oninput="syncSlider('X')" step="10"></div>
                <div style="flex:1;"><label>上下(Y)</label><input type="number" id="offY" value="0" oninput="syncSlider('Y')" step="10"></div>
            </div>
            <label>見込み(D) ※扉を含む総奥行</label><input type="number" id="d" value="450" oninput="drawPreview()">
        </div>

        <div class="group">
            <div class="group-title">3. 仕上・金物仕様</div>
            <div id="specContainer"></div>
            <button class="btn-add" onclick="addRow()">＋ 行を追加</button>
            <div style="margin-top:10px;">
                <label>特記事項</label>
                <input type="text" id="specNote" value="＊現場寸法確認の上製作" style="color:#c0392b;" oninput="drawPreview()">
            </div>
        </div>

        <div class="group" id="freeTextGroup" style="background: #f9ebea; border-left-color: #c0392b;">
            <div class="group-title" style="color: #922b21;">8. 自由テキスト配置 (コピペ可能)</div>
            <div id="extraTextContainer" style="display:flex; flex-direction:column; gap:3px;"></div>
            <button class="btn-add" style="width:100%; margin-top:5px; padding:8px; background: #c0392b;" onclick="addTextRow()">＋ テキスト追加</button>
        </div>

        <div class="group" id="eraserGroup" style="background: #fdedec; border-left-color: #e74c3c;">
            <div class="group-title" style="color: #c0392b;">9. 独立消しゴム・編集ツール</div>
            <div style="display:flex; gap:5px;">
                <button class="btn-main btn-dark" id="eraserModeBtn" onclick="toggleEraser()">消しゴム (OFF)</button>
                <button class="btn-main" style="background:#c0392b; color:white; padding:5px; font-size:11px;" onclick="undoEraser()">1つ戻す</button>
            </div>
            <div style="font-size: 10px; color: #c0392b; margin-top: 5px;">※消しゴムONで要素をクリックすると消去。<br>※「1つ戻す」で最後に消去したものを復元します。</div>
        </div>

        <div class="group" id="furnitureGroup" style="background: #eaf2f8; border-left-color: #2980b9; display:none;">
            <div class="group-title" style="color: #1a5276;">10. 家具詳細設定</div>
            
            <div style="display:flex; gap:10px; align-items:center; background: #fff; padding: 5px; border: 1px solid #2980b9; border-radius: 4px; margin-bottom:5px;">
                <span style="font-size:10px; font-weight:bold; color:#1a5276;">内部構造：</span>
                <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px;" title="可動棚(棚板)は中縦で区切られます">
                    <input type="radio" name="fWin" id="fWinV" value="V" checked onchange="drawPreview()">中縦勝ち
                </label>
                <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px;" title="可動棚(棚板)も側板まで貫通します">
                    <input type="radio" name="fWin" id="fWinH" value="H" onchange="drawPreview()">横(棚)勝ち
                </label>
            </div>

            <div style="margin-bottom: 8px; padding: 5px; background: #fff; border: 1px solid #2980b9; border-radius: 4px;">
                <div style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom:5px;">
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px;">
                        <input type="checkbox" id="fTenGachi" onchange="drawPreview()" checked>天板勝ち
                    </label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px;">
                        <input type="checkbox" id="fChiGachi" onchange="drawPreview()" checked>底板勝ち
                    </label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#c0392b;">
                        <input type="checkbox" id="fUsePillar" onchange="drawPreview()" checked>棚柱
                    </label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#c0392b;">
                        <input type="checkbox" id="fUseDowel" onchange="drawPreview()" checked>ダボ
                    </label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#7f8fa6;">
                        <input type="checkbox" id="fUseDash" onchange="drawPreview()">可動表現(破線)
                    </label>
                </div>
                <div style="display:flex; gap:5px;">
                    <div><label>平面図離れ</label><input type="number" id="fPlanOff" value="500" oninput="drawPreview()"></div>
                    <div><label>断面図離れ</label><input type="number" id="fSecOff" value="300" oninput="drawPreview()"></div>
                </div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>側板厚</label><input type="number" id="fSideT" value="20" oninput="drawPreview()"></div>
                <div><label>天板厚</label><input type="number" id="fTopT" value="20" oninput="drawPreview()"></div>
                <div><label>底板厚</label><input type="number" id="fBotT" value="20" oninput="drawPreview()"></div>
            </div>
            
            <div style="display:flex; gap:5px; margin-top:5px;">
                <div style="flex:1;"><label>中縦(枚数)</label><input type="number" id="fVCount" value="2" oninput="drawPreview()"></div>
                <div style="flex:1;"><label>中縦厚</label><input type="number" id="fVThick" value="20" oninput="drawPreview()"></div>
                <div style="flex:1.5;"><label title="左から順に指定。自動計算は auto">スパン割付 (auto等)</label><input type="text" id="fVSpans" value="" placeholder="例: 300, auto, 300" oninput="drawPreview()" style="background:#fffbcc; border-color:#f1c40f;"></div>
                <div style="flex:0.5; text-align:center;"><label>有効</label><br><input type="checkbox" id="fVUse" checked onchange="drawPreview()"></div>
            </div>
            
            <div style="display:flex; gap:5px; margin-top:5px; padding: 5px; background: #eaf8e6; border: 2px solid #27ae60; border-radius: 4px;">
                <div style="flex:1.5; display:flex; flex-direction:column; gap:2px;">
                    <label style="color:#27ae60;">可動棚枚数 (上から順にカンマ区切)</label>
                    <input type="text" id="fHCount" value="2" placeholder="例: 3, 1 (上が3枚, 下が1枚)" oninput="drawPreview()">
                </div>
                <div style="flex:1;"><label style="color:#27ae60;">可動棚厚</label><input type="number" id="fShelfT" value="20" oninput="drawPreview()"></div>
                <div style="flex:0.5; text-align:center;"><label style="color:#27ae60;">有効</label><br><input type="checkbox" id="fHUse" checked onchange="drawPreview()"></div>
            </div>

            <div style="display:flex; gap:5px; margin-top:5px; padding: 5px; background: #fef9e7; border: 2px solid #e67e22; border-radius: 4px;">
                <div style="flex:1.5; display:flex; flex-direction:column; gap:2px;">
                    <label style="color:#d35400;">中横・固定棚</label>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="fFixedHeights" value="" placeholder="底板からの高さをカンマ区切り (例: 400, 800)" oninput="drawPreview()">
                        <button class="btn-main" style="background:#bdc3c7; color:#333; padding: 4px 8px; font-size: 10px; width:auto;" onclick="deletedShelves.clear(); drawPreview();">復元</button>
                    </div>
                    <label style="font-size:10px; display:flex; align-items:center; gap:3px; cursor:pointer; margin-top:2px;">
                        <input type="checkbox" id="fFixedWin" checked onchange="drawPreview()"> 横勝ち (側板・中立を貫通)
                    </label>
                </div>
                <div style="flex:1;">
                    <label style="color:#d35400;">中横 厚み</label>
                    <input type="number" id="fFixedT" value="20" oninput="drawPreview()">
                </div>
                <div style="flex:1;">
                    <label style="color:#d35400;" title="扉との隙間を埋めるため手前に伸ばします">中横 前伸ばし</label>
                    <input type="number" id="fFixedExtend" value="0" oninput="drawPreview()">
                </div>
                <div style="flex:1;">
                    <label style="color:#d35400;" title="プラスで食い込み、マイナスで隙間が空きます">中立 伸ばし(-で縮む)</label>
                    <input type="number" id="fVExtend" value="0" step="5" oninput="drawPreview()">
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px; background: #fff; padding: 5px; border: 1px solid #2980b9; border-radius: 4px;">
                <div style="flex:1.5;"><label>幕板高 (天板上へ伸びる)</label><input type="number" id="fMakuitaH" value="100" oninput="drawPreview()"></div>
                <div style="flex:0.5; text-align:center;"><label>幕板有効</label><br><input type="checkbox" id="fMakuitaUse" onchange="drawPreview()"></div>
            </div>

            <div style="margin-top:5px; display:flex; gap:10px; align-items:flex-end;">
                <div style="flex:1;">
                    <label>台輪高</label><input type="number" id="fPlinthH" value="60" oninput="drawPreview()">
                </div>
                <div style="flex:1;">
                    <label style="cursor: pointer; background: #2980b9; color: white; padding: 4px 8px; border-radius: 4px; font-weight: normal; font-size: 11px; display:inline-block; margin-bottom: 2px;">
                        <input type="checkbox" id="fPlinthToggle" checked onchange="drawPreview()" style="width: auto; margin: 0 4px 0 0;">台輪 ON/OFF
                    </label>
                </div>
            </div>

            <div style="margin-top:5px; display:flex; gap:10px; align-items:flex-end; padding: 5px; background: #f4ecf7; border: 1px solid #8e44ad; border-radius: 4px;">
                <div style="flex:1.5;">
                    <label style="color:#8e44ad;">背板 (裏空き / 厚み / 溝深さ)</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="fBackOff" value="12" oninput="drawPreview()" title="裏からの空き">
                        <input type="number" id="fBackT" value="3" oninput="drawPreview()" title="背板の厚み">
                        <input type="number" id="fBackIns" value="6" oninput="drawPreview()" title="溝への飲み込み">
                    </div>
                </div>
                <div style="flex:1;">
                    <label style="cursor: pointer; background: #8e44ad; color: white; padding: 4px 8px; border-radius: 4px; font-weight: normal; font-size: 11px; display:inline-block; margin-bottom: 2px;">
                        <input type="checkbox" id="fBackToggle" checked onchange="drawPreview()" style="width: auto; margin: 0 4px 0 0;">背板 ON/OFF
                    </label>
                </div>
            </div>
            </div>

        <div class="group" id="doorGroup" style="background: #fdf2e9; border-left-color: #d35400; display:none;">
            <div class="group-title" style="color: #a04000; display:flex; justify-content:space-between; align-items:center;">
                <span>11. 扉設定 (多段・固定棚連動)</span>
                <label style="cursor: pointer; background: #e67e22; color: white; padding: 2px 8px; border-radius: 4px; font-weight: normal; font-size: 11px;">
                    <input type="checkbox" id="fDoorToggle" checked onchange="drawPreview()" style="width: auto; margin: 0 4px 0 0;">扉 ON/OFF
                </label>
            </div>
            
            <div style="display:flex; gap:10px; align-items:center; background: #fff; padding: 5px; border: 1px solid #d35400; border-radius: 4px; margin-bottom: 5px; margin-top: 5px;">
                <div style="flex:1;">
                    <label style="color:#d35400;">扉 仕上げタイプ</label>
                    <select id="fDoorStyle" onchange="drawPreview()">
                        <option value="flash" selected>フラッシュ (装飾なし)</option>
                        <option value="kamachi">框扉 (パネル)</option>
                        <option value="glass">ガラス扉 (框組)</option>
                        <option value="garari">ガラリ扉</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 5px;">
                <div style="flex:1; background: #fff; padding: 5px; border: 1px solid #e67e22; border-radius: 4px;">
                    <label>縦框(見付)</label><input type="number" id="fKamachiV" value="60" oninput="drawPreview()">
                </div>
                <div style="flex:1; background: #fff; padding: 5px; border: 1px solid #e67e22; border-radius: 4px;">
                    <label>上桟</label><input type="number" id="fKamachiTop" value="60" oninput="drawPreview()">
                </div>
                <div style="flex:1; background: #fff; padding: 5px; border: 1px solid #e67e22; border-radius: 4px;">
                    <label>下桟</label><input type="number" id="fKamachiBot" value="60" oninput="drawPreview()">
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 5px;">
                <div style="flex:1; background: #fff; padding: 5px; border: 1px solid #e67e22; border-radius: 4px;">
                    <label>中桟 (本数)</label><input type="number" id="fNakazanCount" value="0" oninput="drawPreview()">
                </div>
                <div style="flex:1; background: #fff; padding: 5px; border: 1px solid #e67e22; border-radius: 4px;">
                    <label>中桟 (幅)</label><input type="number" id="fNakazanW" value="60" oninput="drawPreview()">
                </div>
            </div>

            <div style="display:flex; gap:10px; align-items:center; background: #fff; padding: 5px; border: 1px solid #d35400; border-radius: 4px; margin-bottom: 5px;">
                <div style="flex:2;">
                    <label style="color:#d35400;">納まり (左右かぶせ・引き戸)</label>
                    <select id="fDoorOverlay" onchange="drawPreview()">
                        <option value="full">全かぶせ (16mm)</option>
                        <option value="half">半かぶせ (8mm)</option>
                        <option value="inset" selected>インセット (両サイド2mm隙間)</option>
                        <option value="sliding">引き違い (20mm重なり・枚数は段設定に連動)</option>
                        <option value="parting">引き分け (中央突き付け・両脇20mm重なり)</option>
                    </select>
                </div>
                <div style="flex:2;">
                    <label style="color:#d35400;">上下インセット</label>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#d35400;" title="引き戸・引き分け選択時は強制的に枠内になります">
                            <input type="checkbox" id="fDoorTopInset" onchange="drawPreview()" checked>天板勝ち
                        </label>
                        <label style="display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#d35400;" title="引き戸・引き分け選択時は強制的に枠内になります">
                            <input type="checkbox" id="fDoorBotInset" onchange="drawPreview()">底板勝ち
                        </label>
                    </div>
                </div>
            </div>

<script>
let ctx = null; let _isDXF = false; let _dxfStr = ""; let _dxfFactor = 1.0; const canvasHeight = 1123; 
let viewZoom = 1.0; let viewOffsetX = 0; let viewOffsetY = 0;
let lastScale = 1;

let dimOffsets = {};
let dimHitboxes = [];
let draggingDim = null;

let eraserHistory = [];
let deletedShelves = new Set(); 
let deletedDims = new Set();
let isEraserMode = false;

let textHitboxes = [];
let dragTargetText = null;
let dragTargetArrow = null;

let shelfHitboxes = []; 
let draggingShelf = null; 

let doorEdgeHitboxes = [];
let draggingDoorEdge = null; 

let vPanelHitboxes = [];
let draggingVPanel = null;

// ★ 全角数字や全角カンマを半角に変換し、配列にするヘルパー関数 ★
function parseNumList(str) {
    if(!str) return [];
    let s = str.replace(/[、，]/g, ',').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    return s.split(',').map(v => v.trim());
}

function onHikiteTypeChange() {
    updateHikiteUI();
    const useHikite = document.getElementById('fHikiteUse').checked;
    const hType = document.getElementById('fHikiteType').value;
    const gapT = document.getElementById('fDoorGapT');
    const gapMid = document.getElementById('fDoorGapMid');
    
    if (useHikite && hType === 'top_edge') {
        if (gapT) gapT.value = 20;
        if (gapMid) gapMid.value = 20;
    } else if (useHikite && hType === 'normal') {
        if (gapT && gapT.value == 20) gapT.value = 2;
        if (gapMid && gapMid.value == 20) gapMid.value = 2;
    }
    drawPreview();
}

function updateHikiteUI() {
    const elType = document.getElementById('fHikiteType');
    const elUse = document.getElementById('fHikiteUse');
    if (!elType || !elUse) return;
    const hType = elType.value;
    const useHikite = elUse.checked;
    const els = document.querySelectorAll('.hikite-normal-only');
    els.forEach(el => {
        el.style.opacity = (useHikite && hType === 'normal') ? '1' : '0.4';
        el.style.pointerEvents = (useHikite && hType === 'normal') ? 'auto' : 'none';
    });
}

function addTextRow(txt="テキスト", x=500, y=500, angle=0, useA=false, ax=600, ay=600) {
    const div = document.createElement('div');
    div.className = 'text-row'; 
    div.style.display = "flex";
    div.style.gap = "5px";
    div.style.marginBottom = "4px";
    
    div.innerHTML = `
        <input type="text" class="extra-txt" value="${txt}" placeholder="内容" oninput="drawPreview()" style="flex:1;">
        <button type="button" class="btn-scale extra-rot" data-angle="${angle}" onclick="rotateText(this)" style="width:40px; padding:0;">${angle}°</button>
        <label style="font-size:10px; display:flex; align-items:center; gap:2px;"><input type="checkbox" class="extra-use-arrow" ${useA?'checked':''} onchange="drawPreview()">矢</label>
        
        <input type="hidden" class="extra-x" value="${x}">
        <input type="hidden" class="extra-y" value="${y}">
        <input type="hidden" class="extra-ax" value="${ax}">
        <input type="hidden" class="extra-ay" value="${ay}">
        
        <button class="btn-copy" onclick="duplicateTextRow(this)">コピー</button>
        <button class="btn-del" onclick="removeRow(this)">×</button>
    `;
    document.getElementById('extraTextContainer').appendChild(div);
    drawPreview();
}

function duplicateTextRow(btn) {
    const row = btn.parentElement;
    const txt = row.querySelector('.extra-txt').value;
    const x = parseFloat(row.querySelector('.extra-x').value) + 100;
    const y = parseFloat(row.querySelector('.extra-y').value) - 100;
    const angle = parseInt(row.querySelector('.extra-rot').dataset.angle);
    const useA = row.querySelector('.extra-use-arrow').checked;
    const ax = parseFloat(row.querySelector('.extra-ax').value) + 100;
    const ay = parseFloat(row.querySelector('.extra-ay').value) - 100;
    
    addTextRow(txt, x, y, angle, useA, ax, ay);
}

function rotateText(btn) {
    let a = parseInt(btn.dataset.angle);
    a = (a + 90) % 360;
    btn.dataset.angle = a;
    btn.innerText = a + "°";
    drawPreview();
}

function toggleEraser() {
    isEraserMode = !isEraserMode;
    const btn = document.getElementById('eraserModeBtn');
    if (isEraserMode) {
        btn.style.background = "#c0392b";
        btn.innerText = "消しゴム (ON)";
        document.getElementById('previewCanvas').style.cursor = 'crosshair';
    } else {
        btn.style.background = "#34495e";
        btn.innerText = "消しゴム (OFF)";
        document.getElementById('previewCanvas').style.cursor = 'grab';
    }
}

function undoEraser() {
    if (eraserHistory.length > 0) {
        let last = eraserHistory.pop();
        if (last.type === 'dim') {
            deletedDims.delete(last.id);
        } else if (last.type === 'shelf') {
            deletedShelves.delete(last.id);
        } else if (last.type === 'text') {
            last.row.style.display = 'flex'; 
        }
        drawPreview();
    }
}

function setScale(val) { document.getElementById('scaleStr').value = val; drawPreview(); }

function addRow(l="", v="") {
    const div = document.createElement('div'); div.className = 'spec-row';
    div.innerHTML = `<input type="text" class="spec-label" value="${l}" oninput="drawPreview()"><input type="text" class="spec-value" value="${v}" oninput="drawPreview()"><button class="btn-del" onclick="removeRow(this)">×</button>`;
    document.getElementById('specContainer').appendChild(div); drawPreview();
}
function removeRow(btn) { btn.parentElement.remove(); drawPreview(); }

function outLine(x1, y1, x2, y2, lw=0.6, color="#000", dash=[]) {
    if(!_isDXF) { 
        ctx.beginPath(); ctx.setLineDash(dash); ctx.strokeStyle = color; ctx.lineWidth = lw; 
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); ctx.setLineDash([]); 
    } else { 
        let layer = dash.length > 0 ? "DASHED" : "0";
        _dxfStr += `  0\r\nLINE\r\n  8\r\n${layer}\r\n 10\r\n${(x1*_dxfFactor).toFixed(2)}\r\n 20\r\n${((canvasHeight-y1)*_dxfFactor).toFixed(2)}\r\n 11\r\n${(x2*_dxfFactor).toFixed(2)}\r\n 21\r\n${((canvasHeight-y2)*_dxfFactor).toFixed(2)}\r\n`; 
    }
}
function outRect(x, y, w, h, lw=1.0, color="#000") { outLine(x, y, x+w, y, lw, color); outLine(x+w, y, x+w, y+h, lw, color); outLine(x+w, y+h, x, y+h, lw, color); outLine(x, y+h, x, y, lw, color); }
function outText(txt, cx, cy, size, angle=0, color="#000", align="center") {
    if(!_isDXF) {
        ctx.fillStyle = color; ctx.font = `bold ${size}px sans-serif`; ctx.textAlign = align; ctx.textBaseline = "middle";
        if(angle !== 0) { ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * Math.PI / 180); ctx.fillText(txt, 0, 0); ctx.restore(); } else ctx.fillText(txt, cx, cy);
    }
}
function outCircle(cx, cy, r, lw=1.0, color="#000", isFill=false) {
    if(!_isDXF) { ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.arc(cx, cy, r, 0, Math.PI * 2); if(isFill) { ctx.fillStyle = color; ctx.fill(); } else { ctx.stroke(); } }
}

function drawDim(scale, originX, originY, x1_mm, y1_mm, x2_mm, y2_mm, default_offset_mm, text, isVert = false, textShiftX = 0, dimId = null) {
    if (dimId && deletedDims.has(dimId)) return;
    let offset_mm = (dimId && dimOffsets[dimId] !== undefined) ? dimOffsets[dimId] : default_offset_mm;
    const orig_x1 = originX + x1_mm * scale; const orig_y1 = originY - y1_mm * scale;
    const orig_x2 = originX + x2_mm * scale; const orig_y2 = originY - y2_mm * scale;
    const dir = Math.sign(offset_mm) || 1;
    const gapS = 100 * scale; 
    const dotR = 1.5; 
    let ay, ax;
    
    if(!isVert) {
        ay = orig_y1 - offset_mm * scale;
        outLine(orig_x1, orig_y1 - gapS*dir, orig_x1, ay - 5*dir, 0.4); outLine(orig_x2, orig_y2 - gapS*dir, orig_x2, ay - 5*dir, 0.4);
        outLine(orig_x1, ay, orig_x2, ay, 0.4); outCircle(orig_x1, ay, dotR, 1, "#000", true); outCircle(orig_x2, ay, dotR, 1, "#000", true);
        outText(text, ((orig_x1 + orig_x2) / 2) + textShiftX, ay - 10*dir, 14); 
    } else {
        ax = orig_x1 - offset_mm * scale;
        outLine(orig_x1 - gapS*dir, orig_y1, ax - 5*dir, orig_y1, 0.4); outLine(orig_x2 - gapS*dir, orig_y2, ax - 5*dir, orig_y2, 0.4);
        outLine(ax, orig_y1, ax, orig_y2, 0.4); outCircle(ax, orig_y1, dotR, 1, "#000", true); outCircle(ax, orig_y2, dotR, 1, "#000", true);
        outText(text, ax - 10*dir + textShiftX, (orig_y1 + orig_y2) / 2, 14, 90); 
    }
    if (dimId && !_isDXF) {
        dimHitboxes.push({ id: dimId, isVert: isVert, x1: isVert ? ax : Math.min(orig_x1, orig_x2), x2: isVert ? ax : Math.max(orig_x1, orig_x2), y1: isVert ? Math.min(orig_y1, orig_y2) : ay, y2: isVert ? Math.max(orig_y1, orig_y2) : ay, defaultOffset: default_offset_mm });
    }
}

function drawHatching(x, y, w, h, scale) {
    if(_isDXF) return; const step = 8 * scale; ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
    ctx.strokeStyle = "#7f8fa6"; ctx.lineWidth = 0.5; 
    for (let i = -h; i < w + h; i += step) { ctx.moveTo(x + i, y + h); ctx.lineTo(x + i + h, y); } ctx.stroke(); ctx.restore();
}

function getVal(id, def) { const el = document.getElementById(id); return (el && el.value !== "") ? parseFloat(el.value) : def; }

function drawExtraTexts(oX, oY, scale) {
    textHitboxes = [];
    const rows = document.querySelectorAll('#extraTextContainer .text-row');
    rows.forEach((row, i) => {
        if (row.style.display === 'none') return; 
        const txt = row.querySelector('.extra-txt').value; if(!txt) return;
        const x = parseFloat(row.querySelector('.extra-x').value);
        const y = parseFloat(row.querySelector('.extra-y').value);
        const angle = parseInt(row.querySelector('.extra-rot').dataset.angle);
        const useA = row.querySelector('.extra-use-arrow').checked;
        const ax = parseFloat(row.querySelector('.extra-ax').value);
        const ay = parseFloat(row.querySelector('.extra-ay').value);

        const cx = oX + x*scale; const cy = oY - y*scale;

        if (useA) {
            const tipX = oX + ax*scale; const tipY = oY - ay*scale;
            if(!_isDXF) {
                ctx.beginPath(); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 1.0;
                ctx.moveTo(cx, cy); ctx.lineTo(tipX, tipY); ctx.stroke();
                const angleLine = Math.atan2(tipY - cy, tipX - cx); const hL = 10;
                ctx.beginPath(); ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX - hL * Math.cos(angleLine - Math.PI/6), tipY - hL * Math.sin(angleLine - Math.PI/6));
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX - hL * Math.cos(angleLine + Math.PI/6), tipY - hL * Math.sin(angleLine + Math.PI/6));
                ctx.stroke();
                textHitboxes.push({ isArrow: true, row: row, x1: tipX - 15, x2: tipX + 15, y1: tipY - 15, y2: tipY + 15 });
            } else {
                outLine(x, y, ax, ay, 1.0, "#e74c3c");
            }
        }
        outText(txt, cx, cy, 14, -angle, useA ? "#e74c3c" : "#000");
        if(!_isDXF) {
            ctx.font = "bold 14px sans-serif"; const tw = ctx.measureText(txt).width;
            textHitboxes.push({ isArrow: false, row: row, x1: cx - tw/2 - 10, x2: cx + tw/2 + 10, y1: cy - 15, y2: cy + 15 });
        }
    });
}

function generateDrawing() {
    dimHitboxes = []; shelfHitboxes = []; doorEdgeHitboxes = []; vPanelHitboxes = [];
    
    let vsp = document.getElementById('fDoorVSplit') ? document.getElementById('fDoorVSplit').value : '1';
    if(document.getElementById('wrapDoorMid')) document.getElementById('wrapDoorMid').style.display = (vsp === '3') ? 'block' : 'none';
    if(document.getElementById('wrapDoorBot')) document.getElementById('wrapDoorBot').style.display = (vsp === '2' || vsp === '3') ? 'block' : 'none';
    if(document.getElementById('wrapGapMid')) document.getElementById('wrapGapMid').style.display = (vsp !== '1') ? 'block' : 'none';
    if(document.getElementById('labelDoorTop')) document.getElementById('labelDoorTop').innerText = (vsp === '1') ? '上段 (枚数 / 吊り元)' : '扉設定 (枚数 / 吊り元)';

    const canvas = document.getElementById('previewCanvas'); const cw = canvas.width, ch = canvas.height;
    if(!_isDXF) { ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, cw, ch); ctx.translate(viewOffsetX, viewOffsetY); ctx.scale(viewZoom, viewZoom); }
    
    const v = { 
        compName: document.getElementById('compName').value, 
        pjName: document.getElementById('pjName').value,
        dwgName: document.getElementById('dwgName').value,
        scaleStr: document.getElementById('scaleStr').value, 
        dateStr: document.getElementById('dateStr').value,
        managerStr: document.getElementById('managerStr').value,
        dwgNoStr: document.getElementById('dwgNoStr').value,
        W: getVal('w', 1800), 
        H: getVal('h', 850), 
        D: getVal('d', 450), 
        offX: getVal('offX', 0), 
        offY: getVal('offY', 0),
        specLabels: Array.from(document.querySelectorAll('.spec-label')).map(el => el.value), 
        specValues: Array.from(document.querySelectorAll('.spec-value')).map(el => el.value), 
        specNote: document.getElementById('specNote') ? document.getElementById('specNote').value : ""
    };

    const doorType = document.getElementById('doorType').value;
    document.getElementById('furnitureGroup').style.display = (doorType === 'furniture') ? 'block' : 'none';
    if(document.getElementById('doorGroup')) document.getElementById('doorGroup').style.display = (doorType === 'furniture') ? 'block' : 'none';
    
    let S_den = 20; let match = v.scaleStr.match(/(\d+)\s*[\/:]\s*(\d+)/); if(match) S_den = parseFloat(match[2]) / parseFloat(match[1]);
    let scale = _isDXF ? 1.0 : (3.779527 / S_den); lastScale = scale;
    const oX = (cw/2) - (v.W*scale)/2 + (v.offX*scale) - 300*scale; const oY = (ch/2) + (v.H*scale)/2 - 50 + (v.offY*scale);
    
    /* --- 図面枠と表題欄 --- */
    const borderOffset = 25; 
    outRect(borderOffset, borderOffset, cw - borderOffset*2, ch - borderOffset*2, 1.0); 
    const ty = ch - borderOffset - 45; 
    outLine(borderOffset, ty, cw - borderOffset, ty, 1.0);
    
    const rX = cw - borderOffset;
    outLine(rX - 860, ty, rX - 860, ch - borderOffset, 1.0); outLine(rX - 540, ty, rX - 540, ch - borderOffset, 1.0);
    outLine(rX - 340, ty, rX - 340, ch - borderOffset, 1.0); outLine(rX - 280, ty, rX - 280, ch - borderOffset, 1.0);
    outLine(rX - 170, ty, rX - 170, ch - borderOffset, 1.0); outLine(rX - 85, ty, rX - 85, ch - borderOffset, 1.0); 

    const midY = ty + 22.5; 
    outText(v.compName, borderOffset + 110, midY, 14); 
    outText(v.pjName, rX - 845, midY, 12, 0, "#000", "left"); 
    outText(v.dwgName, rX - 525, midY, 12, 0, "#000", "left");
    outText(v.scaleStr, rX - 310, midY, 11); 
    outText(v.dateStr, rX - 265, midY, 11, 0, "#000", "left"); 
    outText(v.managerStr, rX - 127, midY, 11); 
    outText(v.dwgNoStr, rX - 42, midY, 12);

    if (doorType === 'furniture') drawFurniture(oX, oY, scale, v);
    else outRect(oX, oY - v.H*scale, v.W*scale, v.H*scale, 1.0);

    /* --- 仕上・金物リスト表 --- */
    const sX_spec = cw - borderOffset - 420; const sY_spec = borderOffset; const tW = 420; const colW = 80; const headerH = 28; const rowH = 22;
    const totalSpecH = headerH + (v.specLabels.length * rowH) + 28;
    outRect(sX_spec, sY_spec, tW, totalSpecH, 0.5); outLine(sX_spec, sY_spec + headerH, sX_spec + tW, sY_spec + headerH, 0.5);

                'dim_bot_side_L': { id: 'fSideT', name: '側板厚' },
                'dim_bot_side_R': { id: 'fSideT', name: '側板厚' },
                'dim_left_plinth': { id: 'fPlinthH', name: '台輪高' },
                'dim_left_makuita': { id: 'fMakuitaH', name: '幕板高' },
                'dim_door_tc': { id: 'fDoorGapT', name: '扉 上すきま' },
                'dim_door_bc': { id: 'fDoorGapB', name: '扉 下すきま' },
                'dim_left_top_T': { id: 'fTopT', name: '天板厚' },
                'dim_left_bot_T': { id: 'fBotT', name: '底板厚' }
            };

            if (map[id]) {
                targetInputId = map[id].id;
                promptMsg = `【${map[id].name}】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_door_t_')) {
                targetInputId = 'fDoorT';
                promptMsg = `【扉厚み】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_door_hikite_x_') || id.startsWith('dim_sd_hikite_x_')) {
                targetInputId = 'fHikiteEdge';
                promptMsg = `【引手 端からのアキ】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_door_hikite_y_') || id.startsWith('dim_sd_hikite_y_')) {
                targetInputId = 'fHikiteH';
                promptMsg = `【引手 上端からの下がり】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_fixed_t_')) {
                targetInputId = 'fFixedT';
                promptMsg = `【固定棚・中横の厚み】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_kamachi_v_')) {
                targetInputId = 'fKamachiV';
                promptMsg = `【縦框 (見付)】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_kamachi_top_')) {
                targetInputId = 'fKamachiTop';
                promptMsg = `【上桟 (見付)】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id.startsWith('dim_kamachi_bot_')) {
                targetInputId = 'fKamachiBot';
                promptMsg = `【下桟 (見付)】の新しい寸法を入力してください:`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id === 'dim_left_overall') {
                targetInputId = 'h';
                promptMsg = `【全高 (H)】の新しい寸法を入力してください:\n※幕板がある場合は本体部分(H)の変更になります。`;
                currentValue = document.getElementById(targetInputId).value;
            } else if (id === 'dim_left_inner_H') {
                isSpecial = 'innerH';
                promptMsg = `【内寸(高さ)】の新しい寸法を入力してください:\n※この寸法に合わせて全高(H)が自動で伸縮します。`;
                let fTop = parseFloat(document.getElementById('fTopT').value) || 0;
                let fBot = parseFloat(document.getElementById('fBotT').value) || 0;
                let fPlinth = document.getElementById('fPlinthToggle').checked ? (parseFloat(document.getElementById('fPlinthH').value) || 0) : 0;
                let H = parseFloat(document.getElementById('h').value) || 0;
                currentValue = H - fTop - fBot - fPlinth;
            } else {
                alert('この寸法は自動計算で割り出されているため、直接変更することはできません。\n基本寸法（WやH）または設定パネルの値を変更してください。');
                return;
            }

            let input = prompt(promptMsg, currentValue);
            if (input !== null && input.trim() !== '') {
                let val = parseFloat(input);
                if (!isNaN(val)) {
                    if (targetInputId) {
                        document.getElementById(targetInputId).value = val;
                    } else if (isSpecial === 'innerH') {
                        let fTop = parseFloat(document.getElementById('fTopT').value) || 0;
                        let fBot = parseFloat(document.getElementById('fBotT').value) || 0;
                        let fPlinth = document.getElementById('fPlinthToggle').checked ? (parseFloat(document.getElementById('fPlinthH').value) || 0) : 0;
                        document.getElementById('h').value = val + fTop + fBot + fPlinth;
                    }
                    drawPreview();
                }
            }
        }
    });

    window.addEventListener('mousemove', (e) => { 
        const r = canvas.getBoundingClientRect();
        const mX = (e.clientX - r.left)*(canvas.width/r.width); const mY = (e.clientY - r.top)*(canvas.height/r.height);
        const cX = (mX - viewOffsetX) / viewZoom; const cY = (mY - viewOffsetY) / viewZoom;

        if (dragTargetText) {
            let dx = cX - dragTargetText.startX; let dy = cY - dragTargetText.startY;
            dragTargetText.row.querySelector('.extra-x').value = Math.round(dragTargetText.startTx + dx/lastScale);
            dragTargetText.row.querySelector('.extra-y').value = Math.round(dragTargetText.startTy - dy/lastScale);
            drawPreview(); return;
        }
        if (dragTargetArrow) {
            let dx = cX - dragTargetArrow.startX; let dy = cY - dragTargetArrow.startY;
            dragTargetArrow.row.querySelector('.extra-ax').value = Math.round(dragTargetArrow.startAx + dx/lastScale);
            dragTargetArrow.row.querySelector('.extra-ay').value = Math.round(dragTargetArrow.startAy - dy/lastScale);
            drawPreview(); return;
        }

        if (draggingVPanel) {
            let dx = cX - draggingVPanel.mouseStartX;
            let mmDx = dx / lastScale; 
            
            let newLeftSpan = draggingVPanel.originalSpans[draggingVPanel.index] + mmDx;
            let newRightSpan = draggingVPanel.originalSpans[draggingVPanel.index+1] - mmDx;
            
            if (newLeftSpan < 0) { newRightSpan += newLeftSpan; newLeftSpan = 0; }
            if (newRightSpan < 0) { newLeftSpan += newRightSpan; newRightSpan = 0; }
            
            let newTempSpans = [...draggingVPanel.tempSpans];
            for (let i=0; i<newTempSpans.length; i++) {
                if (i === draggingVPanel.index) newTempSpans[i] = Math.round(newLeftSpan * 10) / 10;
                else if (i === draggingVPanel.index + 1) newTempSpans[i] = Math.round(newRightSpan * 10) / 10;
            }
            document.getElementById('fVSpans').value = newTempSpans.join(', ');
            drawPreview(); return;
        }

        if (draggingDoorEdge) {
            let newWorldY = (oY - cY) / lastScale;
            let doorTopClearance = getVal('fDoorGapT', 2); let doorBotClearance = getVal('fDoorGapB', 2);
            let fDoorOverlay = document.getElementById('fDoorOverlay') ? document.getElementById('fDoorOverlay').value : 'inset';
            let isSliding = fDoorOverlay === 'sliding'; let isParting = fDoorOverlay === 'parting';
            const fDoorTopInset = (isSliding || isParting) ? true : (document.getElementById('fDoorTopInset') ? document.getElementById('fDoorTopInset').checked : true);
            const fDoorBotInset = (isSliding || isParting) ? true : (document.getElementById('fDoorBotInset') ? document.getElementById('fDoorBotInset').checked : false);
            const isPlinthOn = document.getElementById('fPlinthToggle') ? document.getElementById('fPlinthToggle').checked : true;
            const fTop = getVal('fTopT', 20); const fBot = getVal('fBotT', 20); const fPlinth = isPlinthOn ? getVal('fPlinthH', 60) : 0; const vH = getVal('h', 850);
            
            let currentDoorTopY = (fDoorTopInset ? (vH - fTop) : vH) - doorTopClearance; let currentDoorBotY = (fDoorBotInset ? (fPlinth + fBot) : fPlinth) + doorBotClearance;

            if (draggingDoorEdge.id === 'door_top') {
                let baseY = fDoorTopInset ? (vH - fTop) : vH; let newClearance = Math.round(baseY - newWorldY);
                if (baseY - newClearance > currentDoorBotY + 10) { document.getElementById('fDoorGapT').value = newClearance; }
            } else {
                let baseY = fDoorBotInset ? (fPlinth + fBot) : fPlinth; let newClearance = Math.round(newWorldY - baseY);
                if (baseY + newClearance < currentDoorTopY - 10) { document.getElementById('fDoorGapB').value = newClearance; }
            }
            drawPreview(); return;
        }

        if (draggingShelf) { draggingShelf.currentMouseX = cX; draggingShelf.currentMouseY = cY; drawPreview(); return; }
        if (draggingDim) { let deltaCoord = draggingDim.isVert ? (cX - draggingDim.startMouse) : (cY - draggingDim.startMouse); dimOffsets[draggingDim.id] = draggingDim.startOffset - (deltaCoord / lastScale); drawPreview(); return; }

        if (isD) { viewOffsetX += (e.clientX - sX); viewOffsetY += (e.clientY - sY); sX = e.clientX; sY = e.clientY; drawPreview(); } 
        else {
            let hoveredVPanel = false;
            for (let hb of vPanelHitboxes) { if (cX >= hb.x1 - 5/viewZoom && cX <= hb.x2 + 5/viewZoom && cY >= hb.y1 && cY <= hb.y2) { hoveredVPanel = true; break; } }
            if (hoveredVPanel) { canvas.style.cursor = 'ew-resize'; return; }
            if (getHoveredDoorEdge(cX, cY)) { canvas.style.cursor = 'ns-resize'; return; }
            let hoveredShelf = false;
            for (let hb of shelfHitboxes) { if (cX >= hb.x1 && cX <= hb.x2 && cY >= hb.y1 && cY <= hb.y2) { hoveredShelf = true; break; } }
            if (hoveredShelf) { canvas.style.cursor = 'move'; return; }
            let hoveredText = false;
            for (let hb of textHitboxes) { if (cX >= hb.x1 && cX <= hb.x2 && cY >= hb.y1 && cY <= hb.y2) { hoveredText = true; break; } }
            if (hoveredText) { canvas.style.cursor = isEraserMode ? 'crosshair' : 'move'; return; }
            let hoveredDim = getHoveredDim(cX, cY); 
            if (hoveredDim) {
                if (hoveredDim.id.startsWith('dim_bot_span_') || hoveredDim.id.startsWith('dim_bot_vthick_') || hoveredDim.id.startsWith('dim_fixed_') || hoveredDim.id.startsWith('dim_kamachi_')) canvas.style.cursor = 'pointer'; 
                else canvas.style.cursor = hoveredDim.isVert ? 'ew-resize' : 'ns-resize'; 
            }
            else canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; 
        }
    });

    window.addEventListener('mouseup', () => { 
        isD = false; 
        if (dragTargetText) { dragTargetText = null; canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; }
        if (dragTargetArrow) { dragTargetArrow = null; canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; }
        if (draggingVPanel) { draggingVPanel = null; canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; }
        if (draggingDoorEdge) { draggingDoorEdge = null; canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; }
        if (draggingDim) { draggingDim = null; canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab'; }
        if (draggingShelf) {
            let dx = draggingShelf.currentMouseX - draggingShelf.mouseStartX; let dy = draggingShelf.currentMouseY - draggingShelf.mouseStartY;
            if (Math.sqrt(dx*dx + dy*dy) > 15) { 
                deletedShelves.add(draggingShelf.id);
                if (isEraserMode) eraserHistory.push({ type: 'shelf', id: draggingShelf.id }); 
            }
            draggingShelf = null; drawPreview(); canvas.style.cursor = isEraserMode ? 'crosshair' : 'grab';
        }
    });

    canvas.addEventListener('wheel', (e) => { e.preventDefault(); const r = canvas.getBoundingClientRect(); const mX = (e.clientX - r.left)*(canvas.width/r.width), mY = (e.clientY - r.top)*(canvas.height/r.height); const z = e.deltaY < 0 ? 1.1 : 0.9; const wX = (mX - viewOffsetX)/viewZoom, wY = (mY - viewOffsetY)/viewZoom; viewZoom = Math.max(0.1, Math.min(viewZoom * z, 10)); viewOffsetX = mX - wX*viewZoom; viewOffsetY = mY - wY*viewZoom; drawPreview(); }, { passive: false });
});

function initApp() { 
    ctx = document.getElementById('previewCanvas').getContext('2d'); 
    addRow("本体", "ポリ合板 / メラミン化粧板");
    addRow("金物", "スライド丁番 / ダボ");
    if (typeof updateHikiteUI === 'function') updateHikiteUI();
    drawPreview(); 
}

function saveProjectFile() {
    let data = {
        inputs: {}, checkboxes: {}, radios: {},
        dimOffsets: dimOffsets,
        deletedShelves: Array.from(deletedShelves),
        deletedDims: Array.from(deletedDims),
        extraTexts: [], specs: []
    };
    document.querySelectorAll('input[type="text"]:not(.extra-txt):not(.extra-x):not(.extra-y):not(.extra-ax):not(.extra-ay):not(.spec-label):not(.spec-value), input[type="number"], select').forEach(el => {
        if (el.id) data.inputs[el.id] = el.value;
    });
    document.querySelectorAll('input[type="checkbox"]:not(.extra-use-arrow)').forEach(el => {
        if (el.id) data.checkboxes[el.id] = el.checked;
    });
    document.querySelectorAll('input[type="radio"]').forEach(el => {
        if (el.name && el.checked) data.radios[el.name] = el.id;
    });
    document.querySelectorAll('#extraTextContainer .text-row').forEach(row => {
        if (row.style.display !== 'none') {
            data.extraTexts.push({
                txt: row.querySelector('.extra-txt').value,
                x: row.querySelector('.extra-x').value,
                y: row.querySelector('.extra-y').value,
                angle: row.querySelector('.extra-rot').dataset.angle,
                useA: row.querySelector('.extra-use-arrow').checked,
                ax: row.querySelector('.extra-ax').value,
                ay: row.querySelector('.extra-ay').value
            });
        }
    });
    let sl = document.querySelectorAll('.spec-label'); let sv = document.querySelectorAll('.spec-value');
    for(let i=0; i<sl.length; i++) data.specs.push({l: sl[i].value, v: sv[i].value});

    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    let pName = document.getElementById('pjName').value || 'project';
    let dName = document.getElementById('dwgName').value || 'drawing';
    a.download = pName + '_' + dName + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function loadProjectFile(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.inputs) for (let id in data.inputs) if (document.getElementById(id)) document.getElementById(id).value = data.inputs[id];
            if (data.checkboxes) for (let id in data.checkboxes) if (document.getElementById(id)) document.getElementById(id).checked = data.checkboxes[id];
            if (data.radios) for (let name in data.radios) if (document.getElementById(data.radios[name])) document.getElementById(data.radios[name]).checked = true;
            if (data.dimOffsets) dimOffsets = data.dimOffsets;
            if (data.deletedShelves) deletedShelves = new Set(data.deletedShelves);
            if (data.deletedDims) deletedDims = new Set(data.deletedDims);

            document.getElementById('specContainer').innerHTML = '';
            if (data.specs && data.specs.length > 0) data.specs.forEach(sp => addRow(sp.l, sp.v));
            
            document.getElementById('extraTextContainer').innerHTML = '';
            if (data.extraTexts) data.extraTexts.forEach(t => addTextRow(t.txt, t.x, t.y, t.angle, t.useA, t.ax, t.ay));

            if (typeof updateHikiteUI === 'function') updateHikiteUI();
            input.value = ""; drawPreview();
        } catch(err) { alert('ファイルの読み込みに失敗しました。'); }
    };
    reader.readAsText(file);
}

function exportDXF() {
    _dxfStr = "  0\r\nSECTION\r\n  2\r\nENTITIES\r\n";
    _isDXF = true; _dxfFactor = 1.0; 
    generateDrawing();
    _dxfStr += "  0\r\nENDSEC\r\n  0\r\nEOF\r\n";
    const blob = new Blob([_dxfStr], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    let pName = document.getElementById('pjName').value || 'project';
    let dName = document.getElementById('dwgName').value || 'drawing';
    a.download = pName + '_' + dName + '.dxf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    _isDXF = false; drawPreview();
}

function drawPreview() { _isDXF = false; generateDrawing(); }
function resetViewAndPrint() { viewZoom = 1.0; viewOffsetX = 0; viewOffsetY = 0; drawPreview(); setTimeout(() => window.print(), 200); }
function syncSlider(axis) { document.getElementById('slide'+axis).value = document.getElementById('off'+axis).value; drawPreview(); }
function syncInput(axis) { document.getElementById('off'+axis).value = document.getElementById('slide'+axis).value; drawPreview(); }
function resetToDefault() { location.reload(); }
</script>
